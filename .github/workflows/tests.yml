name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest pytest-asyncio pytest-homeassistant-custom-component ruff

      - name: Lint
        run: ruff check .

      - name: Test
        run: |
          # HA core starts a _run_safe_shutdown_loop thread during integration
          # setup that causes a teardown error in the test framework (not a test
          # failure). Use --tb=short and verify no tests actually FAILED.
          python -m pytest tests/ -v --tb=short 2>&1 | tee pytest-output.txt
          # Fail CI only if any tests FAILED (not just teardown ERRORs)
          ! grep -q " failed" pytest-output.txt
